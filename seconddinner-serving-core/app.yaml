command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: 3baa12157046a0c0
  - name: SERVING_ENDPOINT
    value: databricks-claude-sonnet-4-6

resources:
  - name: snap-card-clusterer
    serving_endpoint:
      name: snap-card-clusterer
      permission: CAN_QUERY
